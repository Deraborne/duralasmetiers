<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Duralas Metiers Embed Scroll</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #embed-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }

    #embed-error {
      display: none;
      padding: 12px;
      color: #dbcca8;
      background: transparent;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <iframe id="embed-frame" scrolling="auto"></iframe>
  <div id="embed-error"></div>

  <script>
    (async function () {
      const iframe = document.getElementById("embed-frame");
      const errorBox = document.getElementById("embed-error");
      const params = new URLSearchParams(window.location.search);
      const page = params.get("page");

      if (!page) {
        errorBox.style.display = "block";
        errorBox.textContent = "Aucune page à afficher.";
        return;
      }

      if (/^https?:\/\//i.test(page) || page.startsWith("//")) {
        errorBox.style.display = "block";
        errorBox.textContent = "URL externe refusée.";
        return;
      }

      async function getGlobalVersion() {
        try {
          const res = await fetch("./version.json", { cache: "no-store" });
          if (!res.ok) return Date.now();
          const data = await res.json();
          return data.version || Date.now();
        } catch (e) {
          return Date.now();
        }
      }

      function withVersion(url, version) {
        const sep = url.includes("?") ? "&" : "?";
        return url + sep + "_embedv=" + encodeURIComponent(version);
      }

      const version = await getGlobalVersion();
      iframe.src = withVersion(page, version);
    })();
  </script>

</body>
</html>
