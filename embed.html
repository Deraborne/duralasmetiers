<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Duralas Metiers Embed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    #embed-frame {
      display: block;
      width: 100%;
      border: 0;
      overflow: hidden;
      background: transparent;
    }

    #embed-error {
      display: none;
      padding: 12px;
      color: #dbcca8;
      background: transparent;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <iframe id="embed-frame" scrolling="no"></iframe>
  <div id="embed-error"></div>

  <script>
    (function () {
      const iframe = document.getElementById("embed-frame");
      const errorBox = document.getElementById("embed-error");
      const params = new URLSearchParams(window.location.search);
      const page = params.get("page");

      if (!page) {
        errorBox.style.display = "block";
        errorBox.textContent = "Aucune page à afficher.";
        return;
      }

      // Sécurité simple : on n'autorise pas les URLs externes
      if (/^https?:\/\//i.test(page) || page.startsWith("//")) {
        errorBox.style.display = "block";
        errorBox.textContent = "URL externe refusée.";
        return;
      }

      iframe.src = page;

      function getInnerHeight() {
        try {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          if (!doc) return 0;

          const body = doc.body;
          const html = doc.documentElement;

          return Math.max(
            body ? body.scrollHeight : 0,
            body ? body.offsetHeight : 0,
            html ? html.scrollHeight : 0,
            html ? html.offsetHeight : 0,
            html ? html.clientHeight : 0
          );
        } catch (e) {
          return 0;
        }
      }

      function sendHeight() {
        const height = getInnerHeight();
        if (!height) return;

        iframe.style.height = height + "px";

        window.parent.postMessage({
          type: "duralasmetiers:resize",
          height: height
        }, "*");
      }

      function installObservers() {
        try {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          if (!doc) return;

          const body = doc.body;
          const html = doc.documentElement;

          if (body) {
            const roBody = new ResizeObserver(sendHeight);
            roBody.observe(body);
          }

          if (html) {
            const roHtml = new ResizeObserver(sendHeight);
            roHtml.observe(html);
          }

          iframe.contentWindow.addEventListener("load", sendHeight);
          iframe.contentWindow.addEventListener("resize", sendHeight);

          const imgs = doc.images || [];
          Array.from(imgs).forEach((img) => {
            if (!img.complete) {
              img.addEventListener("load", sendHeight);
              img.addEventListener("error", sendHeight);
            }
          });

          const fonts = doc.fonts;
          if (fonts && fonts.ready) {
            fonts.ready.then(sendHeight).catch(() => {});
          }
        } catch (e) {}
      }

      iframe.addEventListener("load", () => {
        sendHeight();
        installObservers();

        requestAnimationFrame(sendHeight);
        setTimeout(sendHeight, 50);
        setTimeout(sendHeight, 150);
        setTimeout(sendHeight, 300);
        setTimeout(sendHeight, 700);
        setTimeout(sendHeight, 1200);
      });
    })();
  </script>

</body>
</html>
